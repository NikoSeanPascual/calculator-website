<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Unit Converter</title>
</head>
<body>
<div class="hero">
    <button id="theme-toggle"><img id="theme-img" src="assets/light-mode.png"></button>
    <h1>Metric or <span>Imperial Unit Conversion</span></h1>
    <input id="number-el" type="text" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    <button id="convert-el">Convert</button>
</div>
<div class="results-area">
    <div id="length-container" class="card">
        <h3>Length (Meter/Feet)</h3>
    </div>

    <div id="volume-container" class="card">
        <h3>Volume (Liters/Gallons)</h3>
    </div>

    <div id="mass-container" class="card">
        <h3>Mass (Kilograms/Pounds)</h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
